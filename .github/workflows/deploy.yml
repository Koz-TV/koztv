name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_run:
    workflows: ["Update Blog from Telegram"]
    types:
      - completed

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Run on push OR on successful workflow_run
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Restore image cache
      id: image-cache
      uses: actions/cache@v4
      with:
        path: |
          docs
        key: images-${{ hashFiles('content/**/*.png', 'content/**/*.jpg', 'content/**/*.jpeg') }}-code-${{ hashFiles('engine/build.js', 'engine/lib/**/*.js', 'package.json') }}
        restore-keys: |
          images-${{ hashFiles('content/**/*.png', 'content/**/*.jpg', 'content/**/*.jpeg') }}-
          images-

    - name: Install dependencies
      run: npm ci

    - name: Install sharp for linux
      run: npm install --os=linux --cpu=x64 sharp

    - name: Build site
      env:
        GOOGLE_ANALYTICS: ${{ vars.GOOGLE_ANALYTICS }}
        YANDEX_METRIKA: ${{ vars.YANDEX_METRIKA }}
      run: npm run build

    - name: Copy media files
      run: |
        if [ -d "public/media" ]; then
          cp -r public/media docs/
        fi

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        force_orphan: true
